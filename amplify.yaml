version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - NODE_ENV=development npm ci --legacy-peer-deps
            - npx prisma generate
        build:
          commands:
            - env | grep -e DATABASE_URL -e NEXTAUTH_URL >> .env.production
            - npm run build
            - npm prune --omit=dev
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
          - node_modules/.prisma/client/libquery_engine-rhel-openssl-1.0.x.so.node
          - node_modules/.prisma/client/schema.prisma
      cache:
        paths:
          - node_modules/**/*
      environment:
        PRISMA_CLI_BINARY_TARGETS: rhel-openssl-1.0.x

backend:
  phases:
    preBuild:
      commands:
        - |
          echo "Checking for Amplify backend changes..."
          amplify status --json > /tmp/amplify-status.json
          node - <<'NODE'
          const fs = require('fs');
          const status = JSON.parse(fs.readFileSync('/tmp/amplify-status.json', 'utf8'));
          const resources = status.resources || [];
          const hasChanges = resources.some(r => (r.status || '').toLowerCase() !== 'no change');
          const rootStatus = (status.rootStackStatus || '').toLowerCase();
          const stackChanged = rootStatus && rootStatus !== 'no change';
          if (hasChanges || stackChanged) {
            console.log('changes');
            process.exit(0);
          } else {
            console.log('no-changes');
            process.exit(1);
          }
          NODE
          if [ $? -eq 0 ]; then
            echo "Backend changes detected; running amplifyPush --simple"
            amplifyPush --simple
          else
            echo "No backend changes; skipping amplifyPush"
          fi
  appRoot: .
