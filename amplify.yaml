version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - npm config set prefer-offline true
            - NODE_ENV=development npm ci --legacy-peer-deps
        build:
          commands:
            - env | grep -e NEXTAUTH_URL >> .env.production
            - npm run build
            - npm prune --omit=dev
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache
