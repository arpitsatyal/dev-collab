name: Run Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX: ${{ secrets.PINECONE_INDEX }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

  deploy:
    needs: test  # Only runs if tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'  # Only deploy on push to main
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}  # e.g., us-east-1
      
      - name: Trigger Amplify Build
        id: start_amplify
        run: |
          set -euo pipefail
          JOB_ID=$(aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name main \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Started Amplify job $JOB_ID"

      - name: Wait for Amplify build to finish
        id: wait_amplify
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          JOB_ID: ${{ steps.start_amplify.outputs.job_id }}
        run: |
          set -euo pipefail
          echo "Waiting for Amplify job $JOB_ID"
          for attempt in {1..60}; do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name main \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text)
            echo "Attempt ${attempt}: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "status=TIMEOUT" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_ID: ${{ steps.start_amplify.outputs.job_id }}
          STATUS: ${{ steps.wait_amplify.outputs.status }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          STATUS="${STATUS:-UNKNOWN}"
          JOB_ID="${JOB_ID:-n/a}"
          MESSAGE="Amplify build for ${REPO} on branch main finished with status: ${STATUS}. Job ID: ${JOB_ID}. Workflow run: ${RUN_URL}"
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"${MESSAGE}\"}" \
            "$DISCORD_WEBHOOK_URL"
